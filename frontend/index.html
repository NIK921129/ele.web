<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>VoltFlow — Electrician on Demand</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- Map & Chart libraries (for dashboard simulation) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafc;
      color: #1a1e2b;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
      background: radial-gradient(circle at top center, #eff6ff 0%, #f8fafc 100%);
    }

    /* Premium App Design Tokens */
    :root {
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --secondary: #f1f5f9;
      --surface: #ffffff;
      --border-light: #e2e8f080;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-inverted: #ffffff;
      --gold: #fbbf24;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
      --radius-card: 24px;
      --radius-btn: 14px;
      --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    }

    /* Dark Mode */
    body.dark-mode {
      background: #0f172a;
      color: #e2e8f0;
    }
    body.dark-mode:root {
      --primary: #38bdf8;
      --primary-light: #1e293b;
      --secondary: #1e293b;
      --surface: #1e293b;
      --border-light: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-inverted: #0f172a;
      --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.3);
      --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.4);
      --shadow-lg: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }
    body.dark-mode .logo-text { color: var(--text-main); }
    body.dark-mode .role-switch { background: #0f172a; }
    body.dark-mode .role-btn.active { color: var(--text-inverted); }
    body.dark-mode .notification-icon, body.dark-mode .profile-badge > div { background: var(--surface); border-color: var(--border-light); }
    body.dark-mode .profile-badge .fa-user-circle { color: var(--primary); }
    body.dark-mode .service-item i { background: #0f172a; }
    body.dark-mode .address-bar { background: #0f172a; }
    body.dark-mode .btn-outline { background: transparent; color: var(--primary); border-color: var(--primary); }
    body.dark-mode .electrician-avatar { background: #334155; color: #e2e8f0; }
    body.dark-mode .map-placeholder { background: var(--secondary); border-color: var(--primary); }
    body.dark-mode .earnings-card { background: linear-gradient(145deg, #1e3a8a 0%, #1e293b 100%); }
    body.dark-mode .toast-message { background: #f8fafc; color: #1e293b; }
    body.dark-mode .login-card { background: var(--surface); }
    body.dark-mode .modal-content { background: #1a2233; }
    body.dark-mode .chat-widget { background: var(--surface); box-shadow: var(--shadow-md); }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 16px 16px 32px;
    }

    /* Bottom Navigation (App-like feel) - Mobile First */
    .bottom-nav {
      display: flex; gap: 8px; margin-top: 16px;
      background: var(--surface); border-radius: var(--radius-btn);
      padding: 6px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
    }
    .nav-item {
      flex: 1; text-align: center; padding: 10px; border-radius: 30px; cursor: pointer;
      color: var(--text-muted); font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
    }
    .nav-item.active { background: var(--primary-light); color: var(--primary); }
    
    /* Header / Navigation */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 20px;
      flex-wrap: wrap;
      gap: 15px; /* Add gap for wrapping elements */
      animation: slideDown 0.5s forwards;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo-icon {
      background: var(--gradient-primary);
      color: var(--text-inverted);
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 16px -4px rgba(37,99,235,0.4);
      transition: transform 0.2s;
    }
    .logo-area:hover .logo-icon {
      transform: rotate(-15deg);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: #0f172a;
    }
    .logo-text span { color: var(--primary); font-weight: 800; }

    .role-switch {
      display: flex;
      background: var(--secondary);
      border-radius: 60px;
      padding: 5px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }

    .role-btn {
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-btn.active {
      background: var(--primary);
      color: var(--text-inverted);
      box-shadow: 0 6px 12px -6px rgba(37,99,235,0.3);
    }

    .profile-badge {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .notification-icon {
      background: var(--surface);
      width: 42px;
      height: 42px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
    }
    .notification-icon::after {
      content: '';
      position: absolute;
      top: 10px; right: 12px;
      width: 6px; height: 6px;
      background: var(--danger);
      border-radius: 50%;
      border: 1px solid var(--surface);
    }

    /* Main grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr; /* Default to single column for mobile */
      gap: 24px;
      margin-top: 8px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 24px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUp 0.5s forwards;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .card-header h3 {
      font-weight: 650;
      font-size: 1.25rem;
      color: var(--text-main);
    }
    
    /* Skeletons */
    .skeleton {
      background: linear-gradient(90deg, var(--secondary) 25%, var(--border-light) 50%, var(--secondary) 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes skeletonLoading {
      0% { background-position: 200% 0; } 100% { background-position: -200% 0; }
    }

    /* Service Grid */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* Default to 2 columns for mobile */
      gap: 14px;
      margin: 12px 0 4px;
    }

    .service-item {
      background: var(--surface);
      border-radius: 18px;
      padding: 16px 8px;
      text-align: center;
      border: 2px solid var(--secondary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .service-item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-light);
    }
    .service-item i {
      font-size: 28px;
      color: var(--primary);
      background: var(--secondary);
      padding: 10px;
      border-radius: 16px;
      margin-bottom: 8px;
      transition: all 0.2s;
      font-size: 1.2rem; /* Adjust icon size for mobile */
    }
    .service-item span {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-main);
    }
    .service-item.active {
      border: 2px solid var(--primary);
      background: #eff6ff;
      box-shadow: 0 4px 12px rgba(37,99,235,0.1);
    }

    /* address bar */
    .address-bar {
      background: var(--secondary);
      border-radius: 60px;
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0 12px;
      font-size: 0.9rem; /* Adjust font size for mobile */
    }
    .address-bar i { color: var(--primary); margin-right: 8px; }
    .address-input {
      background: transparent;
      border: none;
      font-size: 0.95rem;
      width: 70%;
      outline: none;
      font-weight: 600;
      color: var(--text-main);
    }

    .btn {
      background: var(--gradient-primary, var(--primary));
      border: none;
      color: var(--text-inverted);
      font-weight: 600;
      padding: 14px 24px;
      border-radius: var(--radius-btn);
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 16px -4px rgba(37,99,235,0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 20px -4px rgba(37,99,235,0.5);
    }
    .btn-outline {
      background: var(--surface);
      color: var(--text-main);
      border: 2px solid var(--border-light);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: var(--secondary);
      border-color: var(--text-muted);
    }
    .btn-block { width: 100%; }

    /* Electrician card */
    .electrician-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .electrician-avatar {
      width: 48px; height: 48px;
      background: var(--secondary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      color: var(--text-main);
      font-weight: bold;
    }
    .rating i { color: var(--gold); margin-right: 2px; }

    /* OTP Input */
    .otp-container { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
    .otp-input { width: 45px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: bold; border-radius: 12px; border: 1px solid var(--border-light); background: var(--secondary); color: var(--text-main); outline: none; transition: border 0.2s; }
    .otp-input:focus { border-color: var(--primary); }

    /* Tags & Badges */
    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .review-tag { padding: 6px 14px; border-radius: 20px; background: var(--secondary); border: 1px solid var(--border-light); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
    .review-tag.selected { background: var(--primary); color: white; border-color: var(--primary); }

    /* Form Elements */
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; color: var(--text-muted); }
    .form-control { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-light); background: var(--secondary); color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; transition: all 0.2s; }
    .form-control:focus { border-color: var(--primary); background: var(--surface); }
    
    /* Invoice Table */
    /* Existing invoice-table styles are fine, but ensure it scrolls horizontally on small screens */
    .invoice-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.95rem; }
    .invoice-table th, .invoice-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-light); color: var(--text-main); }
    .invoice-table th { color: var(--text-muted); font-weight: 500; }
    .invoice-table .total-row { font-weight: bold; font-size: 1.1rem; }

    /* Review Stars */
    .star-rating { display: flex; gap: 8px; font-size: 2rem; color: var(--border-light); cursor: pointer; justify-content: center; margin: 16px 0; transition: color 0.2s; }
    .star-rating i { font-size: 2.2rem; } /* Slightly larger for better touch target */
    .star-rating i.active { color: var(--gold); }
    .star-rating i:hover { transform: scale(1.1); }

    /* tracking simulation */
    .map-placeholder {
      background: #eef2ff;
      border-radius: 28px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: var(--primary);
      border: 1px dashed var(--primary);
      margin: 12px 0;
    }

    /* Right sidebar */
    .earnings-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      color: var(--text-inverted);
      border-radius: 28px;
      padding: 22px;
    }

    /* Inline Stats */
    .inline-stats {
      display: flex;
      gap: 20px;
    }

    /* chart container */
    .chart-container { height: 150px; margin: 10px 0; position: relative; }
    

    /* status badges */
    .badge {
      background: #e6f7e6;
      color: #0b6b3f;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    /* Login Screen */
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 80vh;
    }

    .login-card {
      background: var(--surface);
      padding: 48px 40px;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-lg);
      max-width: 400px;
      width: 100%;
      animation: fadeInUp 0.6s 0.2s forwards;
      margin: 0 16px; /* Add horizontal margin for mobile */
      opacity: 0;
      border: 1px solid var(--border-light);
    }
    .login-card h1 { font-size: 2.2rem; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
    .login-card p { color: var(--text-muted); margin-bottom: 32px; font-size: 1.05rem; }
    .login-card .btn { margin-top: 12px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .modal-overlay.visible { opacity: 1; visibility: visible; }
    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius-card);
      width: 90%;
      max-width: 500px;
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s ease;
      margin: 0 16px; /* Add horizontal margin for mobile */
    }
    .modal-overlay.visible .modal-content { transform: scale(1) translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header button { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
    .modal-body { max-height: 70vh; overflow-y: auto; padding-right: 4px; }

    /* Chat Widget */
    /* This is a fixed position element, ensure it doesn't overlap crucial content on mobile */
    .chat-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      width: 320px;
      z-index: 999;
      overflow: hidden;
      transform: translateY(20px);
      width: calc(100% - 40px); /* Full width minus padding on mobile */
      opacity: 0;
      animation: fadeInUp 0.5s forwards;
    }
    .chat-header { background: var(--primary); color: white; padding: 12px 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; border-top-left-radius: var(--radius-card); border-top-right-radius: var(--radius-card); }
    .chat-body { padding: 16px; height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { max-width: 80%; display: flex; flex-direction: column; }
    .chat-msg.self { align-self: flex-end; align-items: flex-end; }
    .chat-msg.other { align-self: flex-start; align-items: flex-start; }
    .chat-msg span { background: var(--secondary); padding: 8px 12px; border-radius: 16px; border-bottom-left-radius: 4px; display: inline-block; font-size: 0.9rem; }
    .chat-msg.self span { background: var(--primary); color: white; border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
    .chat-msg.sys { align-self: center; align-items: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;}
    .chat-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
    .chat-footer { padding: 12px; border-top: 1px solid var(--border-light); background: var(--surface); }
    .chat-footer .btn { padding: 10px 14px; border-radius: 20px; }
    .chat-footer input { width: 100%; border: none; background: var(--secondary); padding: 10px; border-radius: 20px; outline: none; }

    /* Theme Toggle */
    .theme-toggle {
      background: var(--secondary);
      border: 1px solid var(--border-light);
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* responsiveness */
    @media (min-width: 768px) { /* Tablet and larger */
      .app-container { max-width: 1200px; padding: 16px 0 32px; }
      .dashboard-grid { grid-template-columns: 1fr 340px; }
      .service-grid { grid-template-columns: repeat(4, 1fr); }
      .navbar { flex-direction: row; align-items: center; gap: 0; }
      .role-switch { justify-content: flex-start; }
      .login-card { margin: 0 auto; }
      .modal-content { margin: 0 auto; }
      .chat-widget { width: 320px; }
    }
    
    /* animations */
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeInUp {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .pulse-dot {
      width: 10px; height: 10px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(16,185,129,0.7);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }
    
    #toastContainer {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 10px; z-index: 2000;
    }

    .toast-message {
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.9rem;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      display: flex; align-items: center; gap: 10px;
    }
    .toast-message.show { opacity: 1; transform: translateY(0); }
    .toast-message.success { background: var(--success); }
    .toast-message.error { background: var(--danger); }
    .toast-message.warning { background: var(--warning); color: #000; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & Dependencies via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // ==========================================
    // 1. API & SOCKET UTILITIES
    // ==========================================
    
    // IMPORTANT: Change this URL when you deploy your backend to Render!
    const API_BASE_URL = 'http://localhost:5000/api';
    const socket = io('http://localhost:5000', { autoConnect: false });

    async function fetchJson(url, options = {}) {
      const token = localStorage.getItem('token');
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers,
      };

      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      try {
        const response = await fetch(`${API_BASE_URL}${url}`, {
          headers,
          ...options,
          body: options.body && typeof options.body !== 'string' ? JSON.stringify(options.body) : options.body,
        });
        if (!response.ok) {
          let errorMessage = 'Something went wrong';
          try {
            const errorData = await response.json();
            errorMessage = errorData.message || errorMessage;
          } catch (parseError) {
            errorMessage = `HTTP Error ${response.status}: ${response.statusText}`;
          }
          throw new Error(errorMessage);
        }
        
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch (parseError) {
          return { data: text };
        }
      } catch (error) {
        throw error;
      }
    }

    // ==========================================
    // 2. COMPONENTS
    // ==========================================

    // --- Navbar Component ---
    function Navbar({ user, onLogout }) {
      return (
        <div className="navbar">
          <div className="logo-area">

                  <div style={{ width: '80px', height: '80px', background: 'var(--surface)', borderRadius: '40px', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', boxShadow: '0 0 0 10px rgba(255,255,255,0.5)' }}>
                    <i className="fas fa-radar fa-spin fa-2x" style={{ color: 'var(--primary)' }}></i>
                  </div>
                  <h4>Searching for nearby jobs...</h4>
                  {!availableJob ? (
                    <p style={{ color: 'var(--text-muted)' }}>We are matching you with customers within a 10km radius.</p>
                  ) : (
                    <div style={{ marginTop: '24px', padding: '20px', background: 'var(--surface)', borderRadius: '16px', border: '2px solid var(--success)', boxShadow: 'var(--shadow-lg)' }}>
                      <span className="badge" style={{ background: '#dcfce7', color: '#166534', marginBottom: '12px', display: 'inline-block' }}>NEW MATCH FOUND</span>
                      <p style={{ margin: 0, fontSize: '0.9rem', color: 'var(--text-main)' }}><strong>Service:</strong> {availableJob.serviceType}</p>

                      <button className="btn" style={{ width: '100%', background: 'var(--success)', marginTop: '8px' }} onClick={handleAcceptJob}>
                        Accept Job & Start Tracking
                      </button>
                    </div>

            {isTracking && (
              <div className="card" style={{ animationDelay: '0.1s', border: '2px solid var(--success)', background: '#ecfdf5' }}>

                  <i className="fas fa-location-arrow fa-fade fa-3x" style={{ color: 'var(--success)', marginBottom: '16px' }}></i>
                  <h4 style={{ color: 'var(--success)' }}>En Route to Customer</h4>
                  <p style={{ color: 'var(--text-main)' }}>Live location sharing is active. The customer is seeing your approach!</p>
                  <button className="btn btn-outline" style={{ marginTop: '16px', borderColor: 'var(--danger)', color: 'var(--danger)' }} onClick={() => setIsTracking(false)}>
                    Stop Tracking (Arrived)
                  </button>
                  <button className="btn" style={{ marginTop: '16px', marginLeft: '12px', background: 'var(--success)' }} onClick={handleCompleteJob}>
                    <i className="fas fa-check-circle"></i> Mark as Completed
                  </button>
                </div>
            
            <div style={{ marginTop: '16px', background: 'var(--surface)', border: '1px solid var(--border-light)', borderRadius: '12px', overflow: 'hidden' }}>
              <div style={{ background: 'var(--primary)', color: 'white', padding: '10px 16px', fontWeight: 'bold' }}>
                <i className="fas fa-comments"></i> Message Customer
              </div>
              <div ref={chatContainerRef} style={{ padding: '16px', height: '200px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '10px', background: 'var(--secondary)' }}>
                {messages.map((m, i) => (
                  <div key={i} style={{ alignSelf: m.sender === 'self' ? 'flex-end' : 'flex-start', background: m.sender === 'self' ? 'var(--primary)' : 'var(--surface)', color: m.sender === 'self' ? 'white' : 'var(--text-main)', padding: '8px 12px', borderRadius: '12px', maxWidth: '80%', border: m.sender === 'self' ? 'none' : '1px solid var(--border-light)' }}>
                    <div style={{ fontSize: '0.9rem' }}>{m.text}</div>
                    <div style={{ fontSize: '0.7rem', opacity: 0.8, textAlign: 'right', marginTop: '4px' }}>{m.time}</div>
                  </div>
                ))}
                {messages.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.9rem', margin: 'auto' }}>No messages yet. Send an update!</div>}
              </div>
              <div style={{ padding: '10px', display: 'flex', gap: '8px', borderTop: '1px solid var(--border-light)' }}>
                <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()} placeholder="Type a message..." style={{ flex: 1, padding: '10px', borderRadius: '20px', border: '1px solid var(--border-light)', outline: 'none' }} />

              </div>
            </div>
              </div>
            )}

            <div className="card" style={{ animationDelay: '0.2s' }}>
              <h4><i className="fas fa-book-open"></i> Work Manual & Safety Guidelines</h4>
              <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem', marginBottom: '12px' }}>Review these personalized protocols before starting your assigned jobs today.</p>
              
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                <div style={{ padding: '12px', borderLeft: '4px solid var(--danger)', background: 'var(--secondary)', borderRadius: '0 8px 8px 0' }}>
                  <strong>High Voltage Safety</strong>
                  <p style={{ fontSize: '0.85rem', margin: 0, color: 'var(--text-muted)' }}>Always use a non-contact voltage tester before touching exposed wires. Wear Class 0 rubber gloves for panels up to 1,000V.</p>
                </div>
                <div style={{ padding: '12px', borderLeft: '4px solid var(--primary)', background: 'var(--secondary)', borderRadius: '0 8px 8px 0' }}>
                  <strong>EV Charger Installation Prep</strong>
                  <p style={{ fontSize: '0.85rem', margin: 0, color: 'var(--text-muted)' }}>Verify home load capacity before quoting. Ensure minimum 8 AWG copper wire is used for standard 40A breakers.</p>
                </div>
                <div style={{ padding: '12px', borderLeft: '4px solid var(--warning)', background: 'var(--secondary)', borderRadius: '0 8px 8px 0' }}>
                  <strong>Customer Etiquette</strong>
                  <p style={{ fontSize: '0.85rem', margin: 0, color: 'var(--text-muted)' }}>Always wear protective shoe covers when entering a home. Clearly explain the issue and price breakdown before starting repairs.</p>
                </div>
              </div>
            </div>
          </div>

          <div>
            <div className="earnings-card" style={{ animationDelay: '0.15s' }}>
              <i className="fas fa-wallet"></i> <strong>Weekly Payout Tracker</strong>
              <h3 style={{ margin: '8px 0' }}>₹4,250</h3>
              <p style={{ fontSize: '0.8rem', opacity: 0.8 }}>Next payout processing on Friday.</p>
              <button className="btn btn-block" style={{ background: 'rgba(255,255,255,0.2)', color: 'white', marginTop: '12px' }}>Withdraw to Bank</button>
            </div>
            
            <div className="card" style={{ animationDelay: '0.2s', marginTop: '20px' }}>
              <h4><i className="fas fa-certificate"></i> Your Active Skills</h4>
              <div className="tag-container" style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '12px' }}>
                <span className="review-tag selected">Wiring Repair</span>
                <span className="review-tag selected">AC Servicing</span>
                <span className="review-tag selected">Smart Home Setup</span>
              </div>
              <button className="btn-outline btn btn-block" style={{ marginTop: '16px', fontSize: '0.9rem' }}>+ Add New Certification</button>
            </div>

            <div className="card" style={{ animationDelay: '0.25s', marginTop: '20px' }}>
              <h4><i className="fas fa-calendar-check" style={{ color: 'var(--primary)' }}></i> Upcoming Schedule</h4>
              <div style={{ marginTop: '16px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '12px', padding: '12px', background: 'var(--secondary)', borderRadius: '12px' }}>
                  <div style={{ background: 'var(--primary-light)', color: 'var(--primary)', padding: '10px', borderRadius: '8px', textAlign: 'center', minWidth: '55px' }}>
                    <strong style={{ display: 'block', fontSize: '1.1rem' }}>14</strong>
                    <small style={{ fontSize: '0.7rem', textTransform: 'uppercase', fontWeight: 'bold' }}>Aug</small>
                  </div>
                  <div>
                    <strong style={{ display: 'block', color: 'var(--text-main)' }}>AC Installation</strong>
                    <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)', display: 'block', marginTop: '4px' }}><i className="far fa-clock"></i> 10:00 AM - 12:00 PM</span>
                    <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}><i className="fas fa-map-marker-alt"></i> Koramangala, BLR</span>
                  </div>
                </div>
                <button className="btn-outline btn btn-block" style={{ fontSize: '0.9rem' }}>View Full Calendar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- Admin Dashboard Components ---
    const mockDB = [
      { id: 'USR-1001', type: 'Customer', name: 'Rahul Sharma', phone: '+91 9876543210', pass: 'bcrypt_$2a$12$Kx...', location: 'Koramangala, BLR', service: 'Wiring Issue', payment: '₹349 (Paid)', status: 'Active' },
      { id: 'ELC-2041', type: 'Electrician', name: 'Rajesh Kumar', phone: '+91 9988776655', pass: 'bcrypt_$2a$12$Lp...', location: 'HSR Layout, BLR', service: 'N/A', payment: '₹1250 (Earned)', status: 'Online' },
      { id: 'USR-1002', type: 'Customer', name: 'Anita Desai', phone: '+91 9123456780', pass: 'bcrypt_$2a$12$Zq...', location: 'Indiranagar, BLR', service: 'AC Servicing', payment: '₹950 (Pending)', status: 'Searching' },
    ];

    const mockLogs = [
      { time: '10:42:01 AM', level: 'INFO', src: 'AuthService', event: 'User Login', details: 'ELC-2041 authenticated successfully.' },
      { time: '10:45:12 AM', level: 'WARN', src: 'GeoTracker', event: 'High Latency', details: 'Location tracking API response > 500ms' }
    ];

    function MetricCard({ icon, title, value, trend, color }) {
      return (
        <div style={{ background: 'var(--surface)', padding: '20px', borderRadius: '16px', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--border-light)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <p style={{ margin: 0, color: 'var(--text-muted)', fontSize: '0.9rem', fontWeight: 500 }}>{title}</p>
              <h2 style={{ margin: '8px 0', color: 'var(--text-main)', fontSize: '1.8rem' }}>{value}</h2>
              <p style={{ margin: 0, color: 'var(--text-muted)', fontSize: '0.8rem' }}>{trend}</p>
            </div>
            <div style={{ width: '45px', height: '45px', borderRadius: '12px', background: `${color}20`, color: color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.2rem' }}>
              <i className={`fas ${icon}`}></i>
            </div>
          </div>
        </div>
      );
    }

    function TabButton({ active, onClick, icon, label }) {
      return (
        <button 
          onClick={onClick}
          style={{
            padding: '10px 20px',
            background: active ? 'var(--primary)' : 'var(--surface)',
            color: active ? 'white' : 'var(--text-main)',
            border: '1px solid',
            borderColor: active ? 'var(--primary)' : 'var(--border-light)',
            borderRadius: '8px',
            cursor: 'pointer',
            fontWeight: 600,
            transition: 'all 0.2s'
          }}>
          <i className={`fas ${icon}`} style={{ marginRight: '8px' }}></i> {label}
        </button>
      );
    }

    function AdminPanel({ user, onLogout }) {
      const [activeTab, setActiveTab] = useState('database');
      const [searchTerm, setSearchTerm] = useState('');

      const filteredDB = mockDB.filter(row => 
        Object.values(row).some(val =>
          val != null && String(val).toLowerCase().includes(searchTerm.toLowerCase())
        )
      );

      return (
        <div style={{ padding: '20px', fontFamily: 'var(--font-family, sans-serif)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px', background: 'var(--surface)', padding: '16px 24px', borderRadius: '16px', boxShadow: 'var(--shadow-sm)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <div style={{ background: 'var(--danger)', color: 'white', padding: '10px', borderRadius: '12px' }}>
                <i className="fas fa-user-shield fa-lg"></i>
              </div>
              <div>
                <h2 style={{ margin: 0, color: 'var(--danger)' }}>Master Admin Portal</h2>
                <span style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>Connected to Production Database</span>
              </div>
            </div>
            <button className="btn btn-outline" style={{ borderColor: 'var(--danger)', color: 'var(--danger)' }} onClick={onLogout}>
              <i className="fas fa-power-off"></i> Terminate Session
            </button>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '16px', marginBottom: '24px' }}>
            <MetricCard icon="fa-users" title="Total Users" value="14,205" trend="+12% this week" color="var(--primary)" />
            <MetricCard icon="fa-helmet-safety" title="Active Electricians" value="842" trend="124 currently online" color="var(--warning)" />
            <MetricCard icon="fa-indian-rupee-sign" title="Platform Revenue" value="₹12.4L" trend="3% fee taken" color="var(--success)" />
            <MetricCard icon="fa-server" title="System Uptime" value="99.99%" trend="All systems nominal" color="var(--text-main)" />
          </div>

          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
            <TabButton active={activeTab === 'database'} onClick={() => setActiveTab('database')} icon="fa-database" label="Global Database" />
            <TabButton active={activeTab === 'logs'} onClick={() => setActiveTab('logs')} icon="fa-terminal" label="System Logs" />
          </div>

          <div style={{ background: 'var(--surface)', borderRadius: '16px', boxShadow: 'var(--shadow-md)', overflow: 'hidden', border: '1px solid var(--border-light)' }}>
            {activeTab === 'database' && (
              <div>
                <div style={{ padding: '16px', borderBottom: '1px solid var(--border-light)', display: 'flex', justifyContent: 'space-between' }}>
                  <h3 style={{ margin: 0 }}><i className="fas fa-table" style={{ color: 'var(--primary)' }}></i> Master Records</h3>
                  <input type="text" aria-label="Search records" placeholder="Search IDs, Names, Locations..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} style={{ padding: '8px 16px', borderRadius: '20px', border: '1px solid var(--border-light)', width: '300px', outline: 'none' }} />
                </div>
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.9rem', textAlign: 'left' }}>
                    <thead style={{ background: 'var(--secondary)', color: 'var(--text-muted)' }}>
                      <tr>
                        <th style={{ padding: '14px 16px' }}>System ID</th>
                        <th style={{ padding: '14px 16px' }}>Type</th>
                        <th style={{ padding: '14px 16px' }}>Full Name</th>
                        <th style={{ padding: '14px 16px' }}>Live Location</th>
                        <th style={{ padding: '14px 16px' }}>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredDB.map((row, idx) => (
                        <tr key={row.id} style={{ borderBottom: '1px solid var(--border-light)', background: idx % 2 === 0 ? 'transparent' : 'var(--secondary)' }}>
                          <td style={{ padding: '14px 16px', fontFamily: 'monospace', fontWeight: 'bold' }}>{row.id}</td>
                          <td style={{ padding: '14px 16px' }}><span className="badge" style={{ background: row.type === 'Customer' ? 'var(--primary-light)' : '#fffbeb', color: row.type === 'Customer' ? 'var(--primary)' : 'var(--warning)' }}>{row.type}</span></td>
                          <td style={{ padding: '14px 16px', fontWeight: 500 }}>{row.name}</td>
                          <td style={{ padding: '14px 16px' }}><i className="fas fa-map-marker-alt" style={{ color: 'var(--text-muted)' }}></i> {row.location}</td>
                          <td style={{ padding: '14px 16px' }}><span style={{ color: row.status === 'Online' || row.status === 'Active' ? 'var(--success)' : 'var(--text-muted)', fontWeight: 600 }}>• {row.status}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            {activeTab === 'logs' && (
              <div style={{ background: '#0f172a', color: '#e2e8f0', minHeight: '500px', padding: '16px' }}>
                {mockLogs.map((log, idx) => (
                  <div key={idx} style={{ marginBottom: '10px', display: 'flex', gap: '16px', paddingBottom: '10px', borderBottom: '1px dashed #1e293b' }}>
                    <span style={{ color: '#64748b' }}>[{log.time}]</span>
                    <span style={{ color: log.level === 'INFO' ? '#38bdf8' : '#fbbf24', fontWeight: 'bold', width: '60px' }}>{log.level}</span>
                    <span style={{ color: '#c084fc', width: '150px' }}>{log.src}</span>
                    <span style={{ color: '#f8fafc', flex: 1 }}>{log.event}: <span style={{ color: '#94a3b8' }}>{log.details}</span></span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. MAIN APP BOOTSTRAP
    // ==========================================
    function App() {
      const [currentView, setCurrentView] = useState('login');
      const [user, setUser] = useState(null);

      useEffect(() => {
        const token = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if (token && savedUser) {
          try {
            const userData = JSON.parse(savedUser);
            setUser(userData);
            setCurrentView(userData.role);
          } catch (e) {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
          }
        } else if (token || savedUser) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
        }
      }, []);

      const handleLoginSuccess = (userData, role) => {
        const userWithRole = { ...userData, role };
        setUser(userWithRole);
        setCurrentView(role);
        localStorage.setItem('user', JSON.stringify(userWithRole));
      };

      const handleLogout = () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        setUser(null);
        setCurrentView('login');
      };

      return (
        <div className="app-container">
          {currentView === 'login' ? (
            <Login onLoginSuccess={handleLoginSuccess} />
          ) : currentView === 'admin' ? (
            <div style={{ animation: 'fadeIn 0.5s forwards', width: '100%', maxWidth: '1400px', margin: '0 auto' }}>
              <AdminPanel user={user} onLogout={handleLogout} />
            </div>
          ) : (
            <div style={{ animation: 'fadeIn 0.5s forwards' }}>
              <Navbar user={user} onLogout={handleLogout} />
              <div style={{ padding: '20px 0' }}>
                {currentView === 'customer' && <CustomerHome user={user} />}
                {currentView === 'electrician' && <ElectricianHome user={user} />}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
