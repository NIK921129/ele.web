<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WATTZEN — POWER YOUR NETWORK</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- Map & Chart libraries (for dashboard simulation) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- Google Maps API -->
  <script>
    window.initMap = function() {
      // Global callback for Google Maps Initialization
      window.dispatchEvent(new Event('google-maps-loaded'));
    };
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAOVYRIgupAurZup5y1PRh8Ismb1A3lLao&libraries=places&callback=initMap&loading=async" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafc;
      color: #1a1e2b;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
      background: radial-gradient(circle at top center, #eff6ff 0%, #f8fafc 100%);
    }

    /* Premium App Design Tokens */
    :root {
      --primary: #0d9488; /* A rich, modern teal */
      --primary-light: #f0fdfa; /* A very light mint for highlights */
      --secondary: #f8fafc; /* A cooler, almost white gray */
      --surface: #ffffff;
      --border-light: #e2e8f0;
      --success: #22c55e; /* A more vibrant, positive green */
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-inverted: #ffffff;
      --gold: #fbbf24;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
      --radius-card: 24px;
      --radius-btn: 14px;
      --gradient-primary: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
    }

    /* Dark Mode */
    body.dark-mode {
      background: #020617; /* A deep, cinematic navy */
      color: #e2e8f0;
      --primary: #2dd4bf; /* A bright, high-contrast teal */
      --primary-light: #134e4a; /* A dark, muted teal for backgrounds */
      --secondary: #0f172a; /* Dark slate blue */
      --surface: #1e293b; /* Slightly lighter slate for cards */
      --border-light: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-inverted: #020617;
      --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.3);
      --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.4);
      --shadow-lg: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }
    body.dark-mode .logo-text { color: var(--text-main); }
    body.dark-mode .role-switch { background: #0f172a; }
    body.dark-mode .role-btn.active { color: var(--text-inverted); }
    body.dark-mode .notification-icon, body.dark-mode .profile-badge > div { background: var(--surface); border-color: var(--border-light); }
    body.dark-mode .profile-badge .fa-user-circle { color: var(--primary); }
    body.dark-mode .service-item i { background: #0f172a; }
    body.dark-mode .address-bar { background: #0f172a; }
    body.dark-mode .btn-outline { background: transparent; color: var(--primary); border-color: var(--primary); }
    body.dark-mode .electrician-avatar { background: #334155; color: #e2e8f0; }
    body.dark-mode .map-placeholder { background: var(--secondary); border-color: var(--primary); }
    body.dark-mode .earnings-card { background: linear-gradient(145deg, var(--primary-light) 0%, #0f172a 100%); }
    body.dark-mode .toast-message { background: #f8fafc; color: #1e293b; }
    body.dark-mode .login-card { background: var(--surface); }
    body.dark-mode .modal-content { background: #1a2233; }
    body.dark-mode .chat-widget { background: var(--surface); box-shadow: var(--shadow-md); }

    /* --- New Enhanced Landing Styles --- */
    .landing-page {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at bottom, #0d948820 0%, #020617 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1000;
      perspective: 1000px;
    }

    .power-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, #2dd4bf, transparent);
      height: 1px;
      width: 100%;
      opacity: 0.1;
      animation: surge 8s infinite linear;
    }

    @keyframes surge {
      0% { transform: translateX(-100%) translateY(0); }
      100% { transform: translateX(100%) translateY(var(--y-offset)); }
    }

    @keyframes blob-float {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(100px, 50px) scale(1.2); }
    }

    .floating-icon {
      position: absolute;
      color: rgba(255, 255, 255, 0.15);
      transition: transform 0.1s ease-out; /* For JS parallax */
      pointer-events: none;
      z-index: 2;
    }

    .landing-glass-card {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(45, 212, 191, 0.2);
      padding: 80px 40px;
      border-radius: 40px;
      text-align: center;
      max-width: 600px;
      width: 90%;
      position: relative;
      z-index: 10;
      box-shadow: 0 0 80px -10px rgba(45, 212, 191, 0.25);
    }

    .landing-title {
      color: #fff;
      font-size: 4rem;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -1px;
      text-shadow: 0 0 30px rgba(45, 212, 191, 0.5);
    }

    .landing-title span {
      background: linear-gradient(to right, #5eead4, #2dd4bf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .landing-desc {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    /* Promo Banner */
    .promo-banner {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: white;
      padding: 24px;
      border-radius: var(--radius-card);
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-lg);
      border: 1px solid #334155;
    }

    .landing-btn {
      font-size: 1.3rem;
      padding: 22px 64px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #2dd4bf 0%, #0d9488 100%);
      border: 1px solid rgba(45, 212, 191, 0.5);
      box-shadow: 0 15px 35px rgba(20, 184, 166, 0.3);
    }

    /* Hidden Admin Backdoor Button */
    .secret-master-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.4);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s;
    }
    .secret-master-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      transform: scale(1.1);
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 16px;
    }

    /* Header / Navigation */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 20px;
      flex-wrap: wrap;
      gap: 15px; /* Add gap for wrapping elements */
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: slideDown 0.5s forwards;
    }
    body.dark-mode .navbar { background: rgba(30, 41, 59, 0.8); }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    /* Input Icon Wrappers */
    .input-icon-wrapper { position: relative; display: flex; align-items: center; }
    .input-icon-wrapper input { padding-right: 40px; }
    .input-icon-wrapper .action-icon { position: absolute; right: 12px; cursor: pointer; color: var(--text-muted); transition: 0.2s; font-size: 1.1rem; }
    .input-icon-wrapper .action-icon:hover { color: var(--primary); }

    .logo-icon {
      background: var(--gradient-primary);
      color: var(--text-inverted);
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 16px -4px rgba(13, 148, 136, 0.4);
      transition: transform 0.2s;
    }
    .logo-area:hover .logo-icon {
      transform: rotate(-15deg);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: #0f172a;
    }
    .logo-text span { color: var(--primary); font-weight: 800; }

    .role-switch {
      display: flex;
      background: var(--secondary);
      border-radius: 60px;
      padding: 5px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }

    .role-btn {
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-btn.active {
      background: var(--primary);
      color: var(--text-inverted);
      box-shadow: 0 6px 12px -6px rgba(13, 148, 136, 0.4);
    }

    .profile-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .notification-icon {
      background: var(--surface);
      width: 42px;
      height: 42px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
    }
    .notification-icon::after {
      content: '';
      position: absolute;
      top: 10px; right: 12px;
      width: 6px; height: 6px;
      background: var(--danger);
      border-radius: 50%;
      border: 1px solid var(--surface);
    }

    /* Main grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr; /* Default to single column for mobile */
      gap: 24px;
      margin-top: 8px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 24px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUp 0.5s forwards;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .card-header h3 {
      font-weight: 650;
      font-size: 1.25rem;
      color: var(--text-main);
    }
    
    /* Skeletons */
    .skeleton {
      background: linear-gradient(90deg, var(--secondary) 25%, var(--border-light) 50%, var(--secondary) 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes skeletonLoading {
      0% { background-position: 200% 0; } 100% { background-position: -200% 0; }
    }

    /* Service Grid */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 14px;
      margin: 12px 0 4px;
    }

    .service-item {
      background: var(--surface);
      border-radius: 18px;
      padding: 16px 8px;
      text-align: center;
      border: 2px solid var(--secondary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .service-item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-light);
    }
    .service-item i {
      font-size: 28px;
      color: var(--primary);
      background: var(--secondary);
      padding: 10px;
      border-radius: 16px;
      margin-bottom: 8px;
      transition: all 0.2s;
      font-size: 1.4rem;
    }
    .service-item span {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-main);
    }
    .service-item.active {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.1);
    }
    
    /* Category Tabs */
    .category-tabs {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-top: 16px;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .category-tab {
      padding: 10px 18px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 30px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-muted);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
    }

    /* address bar */
    .address-bar {
      background: var(--secondary);
      border-radius: 60px;
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0 12px;
      font-size: 0.9rem; /* Adjust font size for mobile */
    }
    .address-bar i { color: var(--primary); margin-right: 8px; }
    .address-input {
      background: transparent;
      border: none;
      font-size: 0.95rem;
      width: 70%;
      flex: 1;
      min-width: 0;
      outline: none;
      font-weight: 600;
      color: var(--text-main);
    }

    .btn {
      background: var(--gradient-primary, var(--primary));
      border: none;
      color: var(--text-inverted);
      font-weight: 600;
      padding: 14px 24px;
      border-radius: var(--radius-btn);
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 16px -4px rgba(13, 148, 136, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 20px -4px rgba(13, 148, 136, 0.5);
    }
    .btn-outline {
      background: var(--surface);
      color: var(--text-main);
      border: 2px solid var(--border-light);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: var(--secondary);
      border-color: var(--text-muted);
    }
    .btn-block { width: 100%; }

    /* Electrician card */
    .electrician-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .electrician-avatar {
      width: 48px; height: 48px;
      background: var(--secondary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      color: var(--text-main);
      font-weight: bold;
    }
    .rating i { color: var(--gold); margin-right: 2px; }

    /* OTP Input */
    .otp-container { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
    .otp-input { width: 45px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: bold; border-radius: 12px; border: 1px solid var(--border-light); background: var(--secondary); color: var(--text-main); outline: none; transition: border 0.2s; }
    .otp-input:focus { border-color: var(--primary); }

    /* Tags & Badges */
    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .review-tag { padding: 6px 14px; border-radius: 20px; background: var(--secondary); border: 1px solid var(--border-light); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
    .review-tag.selected { background: var(--primary); color: white; border-color: var(--primary); }

    /* Form Elements */
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; color: var(--text-muted); }
    .form-control { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-light); background: var(--secondary); color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; transition: all 0.2s; }
    .form-control:focus { border-color: var(--primary); background: var(--surface); }
    
    /* Invoice Table */
    /* Existing invoice-table styles are fine, but ensure it scrolls horizontally on small screens */
    .invoice-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.95rem; }
    .invoice-table th, .invoice-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-light); color: var(--text-main); }
    .invoice-table th { color: var(--text-muted); font-weight: 500; }
    .invoice-table .total-row { font-weight: bold; font-size: 1.1rem; }

    /* Review Stars */
    .star-rating { display: flex; gap: 8px; font-size: 2rem; color: var(--border-light); cursor: pointer; justify-content: center; margin: 16px 0; transition: color 0.2s; }
    .star-rating i { font-size: 2.2rem; } /* Slightly larger for better touch target */
    .star-rating i.active { color: var(--gold); }
    .star-rating i:hover { transform: scale(1.1); }

    /* tracking simulation */
    .map-placeholder {
      background: var(--primary-light);
      border-radius: 28px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: var(--primary);
      border: 1px dashed var(--primary);
      margin: 12px 0;
    }

    /* Right sidebar */
    .earnings-card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      color: var(--text-inverted);
      border-radius: 28px;
      padding: 22px;
    }

    /* Inline Stats */
    .inline-stats {
      display: flex;
      gap: 20px;
    }

    /* chart container */
    .chart-container { height: 150px; margin: 10px 0; position: relative; }
    

    /* status badges */
    .badge {
      background: #e6f7e6;
      color: #0b6b3f;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    /* Login Screen */
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 80vh;
    }

    .login-card {
      background: var(--surface);
      padding: 48px 40px;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-lg);
      max-width: 400px;
      width: 100%;
      animation: fadeInUp 0.6s 0.2s forwards;
      margin: 0 16px; /* Add horizontal margin for mobile */
      opacity: 0;
      border: 1px solid var(--border-light);
    }
    .login-card h1 { font-size: 2.2rem; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
    .login-card p { color: var(--text-muted); margin-bottom: 32px; font-size: 1.05rem; }
    .login-card .btn { margin-top: 12px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .modal-overlay.visible { opacity: 1; visibility: visible; }
    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius-card);
      width: 90%;
      max-width: 500px;
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s ease;
      margin: 0 16px; /* Add horizontal margin for mobile */
    }
    .modal-overlay.visible .modal-content { transform: scale(1) translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header button { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
    .modal-body { max-height: 70vh; overflow-y: auto; padding-right: 4px; }

    /* Chat Widget */
    /* This is a fixed position element, ensure it doesn't overlap crucial content on mobile */
    .chat-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      width: 320px;
      z-index: 999;
      overflow: hidden;
      transform: translateY(20px);
      width: calc(100% - 40px); /* Full width minus padding on mobile */
      opacity: 0;
      animation: fadeInUp 0.5s forwards;
    }
    .chat-header { background: var(--primary); color: white; padding: 12px 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; border-top-left-radius: var(--radius-card); border-top-right-radius: var(--radius-card); }
    .chat-body { padding: 16px; height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { max-width: 80%; display: flex; flex-direction: column; }
    .chat-msg.self { align-self: flex-end; align-items: flex-end; }
    .chat-msg.other { align-self: flex-start; align-items: flex-start; }
    .chat-msg span { background: var(--secondary); padding: 8px 12px; border-radius: 16px; border-bottom-left-radius: 4px; display: inline-block; font-size: 0.9rem; }
    .chat-msg.self span { background: var(--primary); color: white; border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
    .chat-msg.sys { align-self: center; align-items: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;}
    .chat-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
    .chat-footer { padding: 12px; border-top: 1px solid var(--border-light); background: var(--surface); }
    .chat-footer .btn { padding: 10px 14px; border-radius: 20px; }
    .chat-footer input { width: 100%; border: none; background: var(--secondary); padding: 10px; border-radius: 20px; outline: none; }

    /* Theme Toggle */
    .theme-toggle {
      background: var(--secondary);
      border: 1px solid var(--border-light);
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* responsiveness */
    @media (min-width: 768px) { /* Tablet and larger */
      .app-container { max-width: 1200px; padding: 16px 0 32px; }
      .dashboard-grid { grid-template-columns: 1fr 340px; }
      .service-grid { grid-template-columns: repeat(4, 1fr); }
      .navbar { flex-direction: row; align-items: center; gap: 0; }
      .role-switch { justify-content: flex-start; }
      .login-card { margin: 0 auto; }
      .modal-content { margin: 0 auto; }
      .chat-widget { width: 320px; }
    }
    @media (max-width: 600px) { /* Mobile specifics */
      .landing-title { font-size: 2.2rem; }
      .landing-desc { font-size: 0.95rem; }
      .landing-btn { padding: 16px 32px; font-size: 1.1rem; width: 100%; }
      .chat-widget { right: 10px; bottom: 10px; width: calc(100% - 20px); }
      .logo-text { font-size: 1.5rem; }
      .card { padding: 16px; }
      .profile-name { display: none; }
      .promo-banner { flex-direction: column; text-align: center; justify-content: center; }
      
      /* App-like Mobile Overrides */
      .desktop-only, .desktop-tabs { display: none !important; }
      .mobile-bottom-nav { display: flex; }
      .app-container { padding-bottom: 90px; }
      .navbar { position: sticky; top: 0; background: var(--surface); z-index: 999; padding: 12px; }
      .modal-content { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; margin: 0; border-radius: 24px 24px 0 0; transform: translateY(100%); }
      .modal-overlay.visible .modal-content { transform: translateY(0); }
    }
    
    /* animations */
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeInUp {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .pulse-dot {
      width: 10px; height: 10px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(16,185,129,0.7);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }
    
    #toastContainer {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 10px; z-index: 2000;
    }

    .toast-message {
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.9rem;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      display: flex; align-items: center; gap: 10px;
    }
    .toast-message.show { opacity: 1; transform: translateY(0); }
    .toast-message.success { background: var(--success); }
    .toast-message.error { background: var(--danger); }
    .toast-message.warning { background: var(--warning); color: #000; }
  </style>
</head>

  <div id="root"></div>

  <script type="module" src="/main.jsx"></script>
</body>
